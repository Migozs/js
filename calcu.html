<!DOCTYPE html>
<head>
    <title>Calculator</title>
</head>
<body>
    <h1>Calculator</h1>

    <form>
        <label for="num1">First Number: </label>
        <input type="number" name="num1" id="num1" value="0"><br><br>
        <input type="number" name="num1" id="num1" value="0"><br><br>

        <label for="num2">Second Number:</label>
        <input type="number" name="num2" id="num2" value="0"><br><br>

        <button type="button" onclick="calculate('add')">ADD</button>

        <button type="button" onclick="calculate('subtract')">SUBTRACT</button>

        <button type="button" onclick="calculate('multiply')">MULTIPLY</button>

        <button type="button" onclick="calculate('divide')">DIVIDE</button><br><br>


        <label for="result">Result: </label>

        <input type="text" name="result" id="result" readonly><br><br>

    </form>

    <script>
        function calculate(operation) {
            let num1 = Number (document.getElementById("num1").value);
            let num2 = Number (document.getElementById("num2").value);
            let result;

            if (operation == 'add') {
                result = num1 + num2;
            } else if (operation == 'subtract') {
                result = num1 - num2;
            } else if (operation == 'multiply') {
              result = num1 * num2;
            } else if (operation == 'divide') {
                if (num2 == 0) {
                    document.getElementById("result").value = "Cannot divide by zero";
                    return;
                } else {
                    result = num1 / num2;
                }
            }

            document.getElementById("result").value = result;
            console.log(result);
        }
    </script>
</body>
</html>
