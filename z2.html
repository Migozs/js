<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button id="btn1">Click Me</button>
    <p id="demo">hello world</p>
    <p id="demo">philip lorenzo</p>
    <input type="text" name="t1" id="t1">

    <script>

        document.getElementById("btn1").addEventListener("click", function(){
            alert("button was click");
        });

        document.getElementById("demo").addEventListener("mouseover", function(){
            console.log("mouse over");
        });

        document.getElementById("t1").addEventListener("keydown", function(k){
            console.log("key pressed: " + k.key);
            document.getElementById("t1").style.backgroundColor = "green";
        });

        document.getElementById("t1").addEventListener("keyup", function() {
            document.getElementById("t1").style.backgroundColor = "red";
        });
    </script>
</body>
</html>
