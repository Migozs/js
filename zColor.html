<!DOCTYPE html>
<head>
    <title>Color Changer</title>
</head>
<body>
    <div id="box" style="width:200px;height:200px;border:1px solid black"></div>
    <button id="colorBtn">Change Color</button>
    <p id="status">Status: </p>

    <script>
        let box = document.getElementById("box");
        
        box.addEventListener("mouseover", function() {
            box.style.backgroundColor = "yellow";
            document.getElementById("status").innerHTML = "Status: Mouse Over";
        });
        
        box.addEventListener("mouseout", function() {
            box.style.backgroundColor = "white";
            document.getElementById("status").innerHTML = "Status: Mouse Out";
        });
        
        document.getElementById("colorBtn").addEventListener("click", function() {
            box.style.backgroundColor = "blue";
            document.getElementById("status").innerHTML = "Status: Clicked";
        });
    </script>
</body>
</html>
